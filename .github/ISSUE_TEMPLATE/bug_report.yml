name: Bug report
description: Track private bugs found during NexaDesk testing.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - NexaDesk version:
        - Installer or dev mode:
        - Provider/model:
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Do not paste real API keys.

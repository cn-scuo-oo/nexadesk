name: Private Installer

on:
  workflow_dispatch:
    inputs:
      artifact_label:
        description: Optional label added to the uploaded installer artifact name.
        required: false
        default: manual
      release_tag:
        description: "Git tag to attach the installer to (e.g. v0.1.0). Leave empty to skip release upload."
        required: false
        default: ""

permissions:
  contents: write
  packages: read

jobs:
  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --include=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Desktop smoke
        run: npm run desktop:smoke

      - name: Desktop data retention smoke
        run: npm run desktop:retention-smoke

      - name: Build NSIS installer
        run: npm run dist:win

      - name: Packaged desktop smoke
        run: npm run desktop:packaged-smoke

      - name: Upload private installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexadesk-windows-installer-${{ inputs.artifact_label }}-${{ github.sha }}
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: error
          retention-days: 14

      - name: Upload installer to GitHub Release
        if: inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
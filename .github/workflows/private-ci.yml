name: Private CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate private build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Settings persistence smoke
        run: npm run settings:smoke

      - name: Desktop smoke
        run: npm run desktop:smoke
